---
# ============================================================
# Préparation système
# ============================================================

- name: Passer les profils AppArmor Kea en mode complain
  command: "aa-complain /usr/sbin/{{ item }}"
  loop:
    - kea-dhcp4
    - kea-ctrl-agent
  become: true
  ignore_errors: true
  changed_when: false

- name: Créer le dossier /etc/kea
  file:
    path: /etc/kea
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true

- name: Configurer la persistance du dossier /run/kea
  copy:
    dest: /etc/tmpfiles.d/kea.conf
    content: "d /run/kea 0750 _kea _kea -"
    owner: root
    group: root
    mode: '0644'
  become: true

- name: Appliquer immédiatement la configuration tmpfiles
  command: systemd-tmpfiles --create
  become: true
  changed_when: false

- name: Vérifier la présence du dossier /run/kea
  file:
    path: /run/kea
    state: directory
    owner: _kea
    group: _kea
    mode: '0750'
  become: true

# ============================================================
# Authentification API
# ============================================================

- name: Déployer le mot de passe API Kea
  copy:
    dest: /etc/kea/kea-api-password
    content: "password"
    owner: _kea
    group: _kea
    mode: '0600'
  become: true

# ============================================================
# Déploiement des configurations
# ============================================================

- name: Déployer la configuration DHCP4
  template:
    src: kea-dhcp4.conf.j2
    dest: /etc/kea/kea-dhcp4.conf
    owner: _kea
    group: _kea
    mode: '0644'
  register: kea_dhcp4_config
  become: true

- name: Valider la configuration DHCP4
  command: kea-dhcp4 -t /etc/kea/kea-dhcp4.conf
  become: true
  changed_when: false

- name: Déployer la configuration Control Agent
  template:
    src: kea-ctrl-agent.conf.j2
    dest: /etc/kea/kea-ctrl-agent.conf
    owner: _kea
    group: _kea
    mode: '0644'
  register: kea_ctrl_agent_config
  become: true

# ============================================================
# Services
# ============================================================

- name: Activer et démarrer kea-dhcp4-server
  systemd:
    name: kea-dhcp4-server
    enabled: true
    state: started
  become: true

- name: Activer et démarrer kea-ctrl-agent
  systemd:
    name: kea-ctrl-agent
    enabled: true
    state: started
  become: true

# ============================================================
# Redémarrage conditionnel
# ============================================================

- name: Redémarrer kea-dhcp4 si configuration modifiée
  service:
    name: kea-dhcp4-server
    state: restarted
  when: kea_dhcp4_config.changed
  become: true

- name: Redémarrer kea-ctrl-agent si configuration modifiée
  service:
    name: kea-ctrl-agent
    state: restarted
  when: kea_ctrl_agent_config.changed
  become: true